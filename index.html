<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HTML Bileşik Adlandırma Oyunu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; color: #fff; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; text-align:center; }

    .scoreboard { display: flex; gap: 2rem; margin-bottom: 1.5rem; }
    .score-box { text-align: center; }
    .score-box .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.06em; }
    .score-box .val   { font-size: 1.6rem; font-weight: 600; color: #fff; }

    .progress-bar { width: 100%; max-width: 640px; height: 4px; background: #2a2a3a; border-radius: 2px; margin-bottom: 2rem; overflow: hidden; }
    .progress-fill { height: 100%; background: #4ade80; border-radius: 2px; transition: width 0.4s ease; }

    #screen-game { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 700px; }
    #screen-end  { display: none; flex-direction: column; align-items: center; text-align: center; gap: 1rem; }

    .game-area { display: flex; gap: 1.5rem; width: 100%; justify-content: center; flex-wrap: wrap; }
    .column    { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 140px; max-width: 280px; }
    .col-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #666; margin-bottom: 4px; text-align: center; }

    /* KART */
    .card {
      background: #1a1b2e;
      border: 2px solid #2e2e4e;
      border-radius: 10px;
      padding: 0.7rem 0.8rem;
      font-size: 15px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .card:active { transform: scale(0.96); }
    .card.selected {
      border-color: #6366f1;
      background: #1e1f40;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.35);
    }
    .card.matched {
      background: #0f2e1a;
      border-color: #4ade80;
      color: #4ade80;
      cursor: default;
    }

    /* DROP ZONE */
    .drop-zone {
      background: #12121e;
      border: 2px dashed #2e2e4e;
      border-radius: 10px;
      padding: 0.7rem 0.8rem;
      min-height: 48px;
      text-align: center;
      font-size: 14px;
      color: #ccc;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .drop-zone.highlight {
      border-color: #6366f1;
      background: #1a1a35;
    }
    .drop-zone.correct {
      background: #0f2e1a;
      border-color: #4ade80;
      color: #4ade80;
      border-style: solid;
      cursor: default;
    }
    .drop-zone.wrong {
      background: #2e0f0f;
      border-color: #f87171;
      border-style: solid;
    }

    .hint-text {
      font-size: 12px;
      color: #555;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .feedback-msg { text-align: center; font-size: 14px; min-height: 1.4rem; margin-top: 1.5rem; color: #aaa; }

    .btn {
      margin-top: 1.5rem; padding: 0.6rem 2rem; border-radius: 8px;
      border: 1.5px solid #333; background: #1a1b2e; color: #e8e8e8;
      font-size: 14px; cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: #252540; }

    .big-score { font-size: 3.5rem; font-weight: 700; color: #4ade80; margin-top: 1rem; }
    .end-msg   { font-size: 1rem; color: #aaa; }
    sub { font-size: 0.65em; }
  </style>
</head>
<body>

<h1>HTML Bileşik Eşleştirme</h1>
<p class="subtitle">Formüle tıkla, sonra doğru isme tıkla</p>

<div class="scoreboard">
  <div class="score-box"><div class="label">Puan</div><div class="val" id="score">0</div></div>
  <div class="score-box"><div class="label">Tur</div><div class="val" id="round-num">1 / 5</div></div>
  <div class="score-box"><div class="label">Doğru</div><div class="val" id="correct-count">0</div></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress" style="width:20%"></div></div>

<div id="screen-game">
  <p class="hint-text" id="hint-text">Önce bir formüle tıkla</p>
  <div class="game-area">
    <div class="column">
      <div class="col-title">Formüller</div>
      <div id="formulas"></div>
    </div>
    <div class="column">
      <div class="col-title">İsimler</div>
      <div id="dropzones"></div>
    </div>
  </div>
  <p class="feedback-msg" id="feedback"></p>
  <button class="btn" id="next-btn" style="display:none" onclick="nextRound()">Sonraki tur →</button>
</div>

<div id="screen-end">
  <div class="big-score" id="final-score"></div>
  <div class="end-msg"   id="final-msg"></div>
  <button class="btn" style="display:block;margin-top:1rem" onclick="restartGame()">Tekrar oyna</button>
</div>

<script>
var ALL = [
  { f: "HCl",    n: "Hidrojen klorür" },
  { f: "CO₂",    n: "Karbon dioksit" },
  { f: "CO",     n: "Karbon monoksit" },
  { f: "SO₂",    n: "Kükürt dioksit" },
  { f: "SO₃",    n: "Kükürt trioksit" },
  { f: "NO₂",    n: "Azot dioksit" },
  { f: "NO",     n: "Azot monoksit" },
  { f: "N₂O",    n: "Diazot monoksit" },
  { f: "PCl₃",   n: "Fosfor triklorür" },
  { f: "PCl₅",   n: "Fosfor pentaklorür" },
  { f: "CCl₄",   n: "Karbon tetraklorür" },
  { f: "SF₆",    n: "Kükürt hekzaflorür" },
  { f: "BF₃",    n: "Bor triflorür" },
  { f: "H₂S",    n: "Dihidrojen sülfür" },
  { f: "N₂O₅",   n: "Diazot pentaoksit" },
  { f: "P₄O₁₀",  n: "Tetrafosfor dekaoksit" },
  { f: "ClF₃",   n: "Klor triflorür" },
  { f: "OF₂",    n: "Oksijen diflorür" },
  { f: "H₂O",    n: "Dihidrojen monoksit" },
  { f: "N₂O₄",   n: "Diazot tetraoksit" },
];

var ROUND_SIZE   = 4;
var TOTAL_ROUNDS = 5;

var roundData  = [];
var roundIdx   = 0;
var score      = 0;
var correctAll = 0;
var matched    = 0;
var selected   = null;  // seçili kart elementi

function shuffle(a) { return a.slice().sort(function() { return Math.random() - 0.5; }); }

function fmt(str) {
  return str.replace(/[₀-₉]+/g, function(m) {
    return '<sub>' + Array.from(m).map(function(c) {
      return '₀₁₂₃₄₅₆₇₈₉'.indexOf(c);
    }).join('') + '</sub>';
  });
}

function buildGame() {
  var pool = shuffle(ALL).slice(0, ROUND_SIZE * TOTAL_ROUNDS);
  roundData = [];
  for (var i = 0; i < TOTAL_ROUNDS; i++) {
    roundData.push(pool.slice(i * ROUND_SIZE, (i + 1) * ROUND_SIZE));
  }
}

function setFeedback(txt) {
  document.getElementById('feedback').textContent = txt;
}

function setHint(txt) {
  document.getElementById('hint-text').textContent = txt;
}

function clearSelected() {
  if (selected) {
    selected.classList.remove('selected');
    selected = null;
  }
  // drop zone highlight kaldır
  document.querySelectorAll('.drop-zone').forEach(function(z) {
    z.classList.remove('highlight');
  });
}

function renderRound() {
  matched  = 0;
  selected = null;

  var pairs = roundData[roundIdx];

  document.getElementById('round-num').textContent  = (roundIdx + 1) + ' / ' + TOTAL_ROUNDS;
  document.getElementById('progress').style.width   = ((roundIdx + 1) / TOTAL_ROUNDS * 100) + '%';
  document.getElementById('next-btn').style.display = 'none';
  setFeedback('');
  setHint('Önce bir formüle tıkla');

  /* Formül kartları */
  var fEl = document.getElementById('formulas');
  fEl.innerHTML = '';
  shuffle(pairs).forEach(function(item) {
    var card = document.createElement('div');
    card.className   = 'card';
    card.dataset.key = item.f;
    card.innerHTML   = fmt(item.f);
    card.addEventListener('click', function() { onCardClick(card); });
    fEl.appendChild(card);
  });

  /* Drop zone'lar */
  var dEl = document.getElementById('dropzones');
  dEl.innerHTML = '';
  shuffle(pairs).forEach(function(item) {
    var zone = document.createElement('div');
    zone.className   = 'drop-zone';
    zone.dataset.key = item.f;
    zone.textContent = item.n;
    zone.addEventListener('click', function() { onZoneClick(zone); });
    dEl.appendChild(zone);
  });
}

function onCardClick(card) {
  if (card.classList.contains('matched')) return;

  // Zaten seçiliyse seçimi kaldır
  if (selected === card) {
    clearSelected();
    setHint('Önce bir formüle tıkla');
    setFeedback('');
    return;
  }

  clearSelected();
  selected = card;
  card.classList.add('selected');

  // Eşleşmemiş drop-zone'ları highlight et
  document.querySelectorAll('.drop-zone').forEach(function(z) {
    if (!z.classList.contains('correct')) z.classList.add('highlight');
  });

  setHint('Şimdi doğru isme tıkla');
  setFeedback('');
}

function onZoneClick(zone) {
  if (zone.classList.contains('correct')) return;
  if (!selected) {
    setFeedback('Önce bir formül seçmelisin.');
    return;
  }

  var key = selected.dataset.key;

  if (key === zone.dataset.key) {
    // DOĞRU
    zone.classList.remove('highlight');
    zone.classList.add('correct');
    selected.classList.add('matched');
    selected.classList.remove('selected');
    selected = null;

    // Diğer highlight'ları kaldır
    document.querySelectorAll('.drop-zone').forEach(function(z) {
      z.classList.remove('highlight');
    });

    score++;
    correctAll++;
    matched++;
    document.getElementById('score').textContent         = score * 10;
    document.getElementById('correct-count').textContent = correctAll;
    setFeedback('Doğru eşleşme.');
    setHint(matched < ROUND_SIZE ? 'Sıradaki formüle tıkla' : '');

    if (matched === ROUND_SIZE) {
      setFeedback('Tur tamamlandı.');
      setHint('');
      if (roundIdx === TOTAL_ROUNDS - 1) {
        setTimeout(showEnd, 900);
      } else {
        document.getElementById('next-btn').style.display = 'block';
      }
    }
  } else {
    // YANLIŞ
    zone.classList.add('wrong');
    setFeedback('Yanlış. Başka bir isim dene.');
    setTimeout(function() { zone.classList.remove('wrong'); }, 700);
    // Seçim devam eder — tekrar deneyebilir
  }
}

function nextRound() {
  roundIdx++;
  renderRound();
}

function showEnd() {
  document.getElementById('screen-game').style.display = 'none';
  document.getElementById('screen-end').style.display  = 'flex';
  var total = TOTAL_ROUNDS * ROUND_SIZE;
  document.getElementById('final-score').textContent = (score * 10) + ' / ' + (total * 10);
  var pct = score / total;
  document.getElementById('final-msg').textContent =
    pct === 1   ? 'Mükemmel. Tüm eşleşmeleri doğru yaptın. ' :
    pct >= 0.7  ? 'Harika. Çok az hata yaptın.' :
    pct >= 0.4  ? 'İyi gidiyorsun, biraz daha pratik yapabilirsin.' :
                  'Ön ekleri tekrar gözden geçirmeyi dene.';
}

function restartGame() {
  score = 0; correctAll = 0; roundIdx = 0;
  document.getElementById('score').textContent         = '0';
  document.getElementById('correct-count').textContent = '0';
  document.getElementById('screen-end').style.display  = 'none';
  document.getElementById('screen-game').style.display = 'flex';
  buildGame();
  renderRound();
}

buildGame();
renderRound();
</script>
</body>
</html>
